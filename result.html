<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DeepSight AI — Detection Result</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --bg:#04101e;--bg2:#060f1c;--card:rgba(8,22,42,0.8);
      --border:rgba(14,165,233,0.15);--border-h:rgba(14,165,233,0.4);
      --txt:#f0f9ff;--txt2:#8eafc2;--txt3:#4e6e85;
      --accent:#0ea5e9;--cyan:#22d3ee;--purple:#8b5cf6;
      --nav-bg:rgba(4,16,30,0.92);--stat-bg:rgba(6,18,36,0.9);
    }
    [data-theme="light"]{
      --bg:#eef6fb;--bg2:#e0eef7;--card:rgba(255,255,255,0.88);
      --border:rgba(14,165,233,0.18);--border-h:rgba(14,165,233,0.5);
      --txt:#071828;--txt2:#2a4a62;--txt3:#5580a0;
      --nav-bg:rgba(238,246,251,0.94);--stat-bg:rgba(220,238,252,0.7);
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    html{scroll-behavior:smooth;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden;transition:background 0.4s,color 0.4s;}
    #dots-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}

    /* NAVBAR */
    .navbar{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--nav-bg);backdrop-filter:blur(18px);border-bottom:1px solid var(--border);transition:background 0.4s;}
    .nav-inner{max-width:1200px;margin:0 auto;padding:0 1.4rem;height:62px;display:flex;align-items:center;justify-content:space-between;gap:1rem;}
    .nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0;}
    .nav-logo img{width:34px;height:34px;object-fit:contain;border-radius:8px;}
    .nav-logo-fb{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,#0c2a44,#0ea5e9);display:none;align-items:center;justify-content:center;font-size:1rem;}
    .logo-name{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;color:var(--txt);}
    .logo-name .s{color:var(--accent);}
    .nav-links{display:flex;align-items:center;gap:0.2rem;position:absolute;left:50%;transform:translateX(-50%);}
    .nav-link{padding:0.4rem 0.85rem;border-radius:8px;font-size:0.88rem;font-weight:600;color:var(--txt2);text-decoration:none;transition:all 0.2s;white-space:nowrap;}
    .nav-link:hover{background:rgba(14,165,233,0.1);color:var(--accent);}
    .nav-link.active{background:rgba(14,165,233,0.15);color:var(--accent);}
    .nav-right{display:flex;align-items:center;gap:0.5rem;flex-shrink:0;}
    .theme-btn{width:34px;height:34px;border-radius:50%;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:0.95rem;transition:all 0.3s;}
    .theme-btn:hover{border-color:var(--accent);transform:rotate(20deg);}
    .nav-username{font-size:0.85rem;font-weight:600;color:var(--txt2);padding:0.35rem 0.7rem;border-radius:8px;background:rgba(14,165,233,0.06);border:1px solid var(--border);}
    .logout-btn{width:34px;height:34px;border-radius:8px;background:none;border:1px solid rgba(239,68,68,0.2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:#f87171;transition:all 0.2s;}
    .logout-btn:hover{background:rgba(239,68,68,0.1);}
    .logout-btn svg{width:16px;height:16px;}
    .hamburger{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:4px;}
    .hamburger span{display:block;width:22px;height:2px;background:var(--txt);border-radius:2px;transition:all 0.3s;}
    .mobile-menu{display:none;position:fixed;top:62px;left:0;right:0;z-index:99;background:var(--nav-bg);backdrop-filter:blur(18px);border-bottom:1px solid var(--border);padding:0.5rem 1rem 1rem;flex-direction:column;gap:0.2rem;}
    .mobile-menu.open{display:flex;}
    .mob-link{display:block;padding:0.7rem 1rem;border-radius:10px;font-size:0.95rem;font-weight:600;color:var(--txt2);text-decoration:none;transition:background 0.2s;background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;text-align:left;}
    .mob-link:hover{background:rgba(14,165,233,0.08);}
    .mob-link.active{background:rgba(14,165,233,0.12);color:var(--accent);}
    .mob-logout{display:flex;align-items:center;gap:8px;padding:0.7rem 1rem;border-radius:10px;font-size:0.95rem;font-weight:600;color:#f87171;background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;text-align:left;}
    .mob-logout:hover{background:rgba(239,68,68,0.08);}

    /* PAGE */
    .page{position:relative;z-index:1;padding:70px 1.2rem 3rem;min-height:100vh;}
    .page-inner{max-width:680px;margin:0 auto;}

    /* Back link */
    .back-link{display:inline-flex;align-items:center;gap:7px;padding:0.5rem 0;font-size:0.9rem;font-weight:600;color:var(--txt2);text-decoration:none;margin-bottom:1.2rem;transition:color 0.2s;}
    .back-link:hover{color:var(--accent);}
    .back-link svg{width:16px;height:16px;}

    /* Annotated image */
    .result-img-wrap{border-radius:18px;overflow:hidden;margin-bottom:1.4rem;background:#fff;border:1px solid var(--border);}
    .result-img-wrap img{width:100%;display:block;border-radius:18px;}

    /* Summary card */
    .summary-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:1.6rem;margin-bottom:1.2rem;backdrop-filter:blur(12px);}
    .summary-title{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;color:var(--txt);margin-bottom:1.2rem;}
    .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.8rem;}
    .stat-box{background:var(--stat-bg);border-radius:14px;padding:1.2rem 1rem;text-align:center;}
    .stat-val{font-family:'Syne',sans-serif;font-size:2.2rem;font-weight:800;color:var(--accent);line-height:1;margin-bottom:0.4rem;}
    .stat-val.purple{color:var(--purple);}
    .stat-lbl{font-size:0.82rem;color:var(--txt2);line-height:1.4;}

    /* Actions */
    .actions{margin-bottom:1.4rem;display:flex;flex-direction:column;gap:0.7rem;}
    .btn-download{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:0.95rem;border-radius:50px;background:linear-gradient(135deg,#0ea5e9,#22d3ee);color:#fff;font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:700;border:none;cursor:pointer;box-shadow:0 6px 22px rgba(14,165,233,0.4);transition:all 0.3s;}
    .btn-download:hover{transform:translateY(-2px);box-shadow:0 12px 34px rgba(14,165,233,0.55);}
    .btn-download svg{width:20px;height:20px;}
    .btn-row{display:grid;grid-template-columns:1fr 1fr;gap:0.7rem;}
    .btn-outline{display:flex;align-items:center;justify-content:center;padding:0.8rem;border-radius:50px;background:transparent;color:var(--txt);font-family:'Syne',sans-serif;font-size:0.9rem;font-weight:700;border:1.5px solid var(--border);cursor:pointer;transition:all 0.3s;text-decoration:none;}
    .btn-outline:hover{border-color:var(--accent);color:var(--accent);}

    /* Detected objects */
    .objects-title{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:800;color:var(--txt);margin-bottom:1rem;}
    .obj-list{display:flex;flex-direction:column;gap:0.8rem;}
    .obj-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1rem 1.2rem;backdrop-filter:blur(10px);transition:border-color 0.2s;}
    .obj-card:hover{border-color:var(--border-h);}
    .obj-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.7rem;}
    .obj-badge{padding:0.28rem 0.8rem;border-radius:50px;font-size:0.82rem;font-weight:700;color:#fff;text-transform:capitalize;}
    .obj-conf{font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:800;}
    .obj-bar-wrap{height:6px;background:rgba(255,255,255,0.08);border-radius:3px;margin-bottom:0.6rem;overflow:hidden;}
    [data-theme="light"] .obj-bar-wrap{background:rgba(0,0,0,0.08);}
    .obj-bar{height:100%;border-radius:3px;width:0;transition:width 1s ease;}
    .obj-box{font-size:0.78rem;color:var(--txt3);}

    .no-result{text-align:center;padding:3rem 1.5rem;color:var(--txt2);}
    .no-result a{color:var(--accent);text-decoration:none;font-weight:600;}

    @media(max-width:768px){
      .nav-links{display:none;}
      .nav-right .nav-username,.nav-right .logout-btn,.nav-right .theme-btn{display:none;}
      .hamburger{display:flex;}
    }
    @media(min-width:769px){.mobile-menu{display:none!important;}}
  </style>
</head>
<body>

<canvas id="dots-canvas"></canvas>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <img src="object.jpeg" alt="DeepSight AI" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
      <div class="nav-logo-fb">👁</div>
      <span class="logo-name">Deep<span class="s">Sight</span> AI</span>
    </a>
    <div class="nav-links">
      <a href="detect.html" class="nav-link active">Detect</a>
      <a href="history.html" class="nav-link">History</a>
      <a href="classes.html" class="nav-link">Classes</a>
      <a href="stats.html" class="nav-link">Stats</a>
    </div>
    <div class="nav-right">
      <button class="theme-btn" id="theme-btn">☀️</button>
      <span class="nav-username" id="nav-user">—</span>
      <button class="logout-btn" onclick="doLogout()" title="Logout">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
  </div>
  <div class="mobile-menu" id="mobile-menu">
    <a href="detect.html" class="mob-link active">Detect</a>
    <a href="history.html" class="mob-link">History</a>
    <a href="classes.html" class="mob-link">Classes</a>
    <a href="stats.html" class="mob-link">Stats</a>
    <hr style="border:none;border-top:1px solid var(--border);margin:0.3rem 0"/>
    <button class="mob-logout" onclick="doLogout()">
      <svg width="16" height="16" fill="none" stroke="#f87171" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      <span id="mob-logout-lbl">Logout</span>
    </button>
  </div>
</nav>

<div class="page">
  <div class="page-inner">
    <a href="detect.html" class="back-link">
      <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Back to Detect
    </a>
    <div id="result-body"></div>
  </div>
</div>

<script>
const BOX_COLORS=['#0ea5e9','#8b5cf6','#22d3ee','#10b981','#f59e0b','#ef4444','#ec4899','#6366f1','#14b8a6','#f97316'];
function col(i){return BOX_COLORS[i%BOX_COLORS.length];}

// AUTH
const user=sessionStorage.getItem('deepsight_user');
if(!user) window.location.href='login.html';
document.getElementById('nav-user').textContent=user||'—';
document.getElementById('mob-logout-lbl').textContent=`Logout (${user})`;
function doLogout(){sessionStorage.removeItem('deepsight_user');window.location.href='login.html';}

// HAMBURGER
const ham=document.getElementById('hamburger'),mob=document.getElementById('mobile-menu');
ham.addEventListener('click',()=>{ham.classList.toggle('open');mob.classList.toggle('open');});

// THEME
const html=document.documentElement,tBtn=document.getElementById('theme-btn');
function applyTheme(t){html.setAttribute('data-theme',t);localStorage.setItem('ds_theme',t);tBtn.textContent=t==='dark'?'☀️':'🌙';}
tBtn.addEventListener('click',()=>applyTheme(html.getAttribute('data-theme')==='dark'?'light':'dark'));
applyTheme(localStorage.getItem('ds_theme')||'dark');

// DOTS
(function(){
  const c=document.getElementById('dots-canvas'),ctx=c.getContext('2d');let dots=[];
  function resize(){c.width=innerWidth;c.height=innerHeight;}
  function make(){dots=[];const n=Math.floor(c.width*c.height/12000);for(let i=0;i<n;i++)dots.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*2+0.8,vx:(Math.random()-.5)*.35,vy:(Math.random()-.5)*.35,alpha:Math.random()*.55+.15,p:Math.random()*Math.PI*2,ps:Math.random()*.025+.008});}
  function draw(){ctx.clearRect(0,0,c.width,c.height);dots.forEach(d=>{d.x+=d.vx;d.y+=d.vy;d.p+=d.ps;if(d.x<-5)d.x=c.width+5;if(d.x>c.width+5)d.x=-5;if(d.y<-5)d.y=c.height+5;if(d.y>c.height+5)d.y=-5;const a=d.alpha*(.55+.45*Math.sin(d.p));const g=ctx.createRadialGradient(d.x,d.y,0,d.x,d.y,d.r*3);g.addColorStop(0,`rgba(34,211,238,${a})`);g.addColorStop(.4,`rgba(14,165,233,${a*.6})`);g.addColorStop(1,`rgba(14,165,233,0)`);ctx.beginPath();ctx.arc(d.x,d.y,d.r*3,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();ctx.beginPath();ctx.arc(d.x,d.y,d.r*.6,0,Math.PI*2);ctx.fillStyle=`rgba(180,240,255,${a*.9})`;ctx.fill();});requestAnimationFrame(draw);}
  resize();make();draw();window.addEventListener('resize',()=>{resize();make();});
})();

// ════════════════════════════
// LOAD + RENDER RESULT
// ════════════════════════════
let result=null;
try{result=JSON.parse(sessionStorage.getItem('ds_result')||'null');}catch(e){}

const body=document.getElementById('result-body');

if(!result||!result.imageData){
  body.innerHTML=`<div class="no-result">
    <p style="font-size:3rem;margin-bottom:1rem">🔍</p>
    <p style="font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:800;margin-bottom:0.5rem">No result to display</p>
    <p style="margin-bottom:1.5rem;color:var(--txt3);font-size:0.9rem">Please run a detection first.</p>
    <a href="detect.html">← Go to Detect</a>
  </div>`;
} else {
  const preds  = result.predictions||[];
  const total  = preds.length;
  const unique = [...new Set(preds.map(p=>p.class))].length;
  const topCls = total>0?preds[0].class:'—';
  const avgConf= total>0?Math.round(preds.reduce((s,p)=>s+(p.score!=null?p.score:(p.confidence||0)/100),0)/total*100):0;
  const imgSrc = result.annotatedImage||result.imageData;

  body.innerHTML=`
    <div class="result-img-wrap">
      <img src="${imgSrc}" alt="Detection Result"/>
    </div>

    <div class="summary-card">
      <div class="summary-title">Detection Summary</div>
      <div class="stats-grid">
        <div class="stat-box">
          <div class="stat-val" id="sv-total">0</div>
          <div class="stat-lbl">Objects<br/>Found</div>
        </div>
        <div class="stat-box">
          <div class="stat-val" id="sv-unique">0</div>
          <div class="stat-lbl">Unique<br/>Classes</div>
        </div>
        <div class="stat-box">
          <div class="stat-val purple" style="font-size:${topCls.length>8?'1.05rem':'2.2rem'}">${topCls}</div>
          <div class="stat-lbl">Top<br/>Detection</div>
        </div>
        <div class="stat-box">
          <div class="stat-val" id="sv-conf">0%</div>
          <div class="stat-lbl">Avg<br/>Confidence</div>
        </div>
      </div>
    </div>

    <div class="actions">
      <button class="btn-download" onclick="downloadPDF()">
        <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download
      </button>
      <div class="btn-row">
        <a href="detect.html" class="btn-outline">Detect Another</a>
        <a href="history.html" class="btn-outline">View History</a>
      </div>
    </div>

    <div class="objects-title">Detected Objects</div>
    <div class="obj-list">
      ${preds.length===0
        ? '<div class="no-result"><p>No objects detected.</p></div>'
        : preds.map((p,i)=>{
            const conf=p.score!=null?Math.round(p.score*100):(p.confidence||0);
            const bbox=Array.isArray(p.bbox)?p.bbox.map(v=>Math.round(v)):[];
            const c=col(i);
            return `<div class="obj-card">
              <div class="obj-top">
                <span class="obj-badge" style="background:${c}">${p.class}</span>
                <span class="obj-conf" style="color:${c}">${conf}%</span>
              </div>
              <div class="obj-bar-wrap">
                <div class="obj-bar" style="background:${c}" data-w="${conf}"></div>
              </div>
              <div class="obj-box">Box: [${bbox.join(', ')}]</div>
            </div>`;
          }).join('')
      }
    </div>`;

  // Count-up
  countUp('sv-total',total,'');
  countUp('sv-unique',unique,'');
  countUp('sv-conf',avgConf,'%');
  // Bar animations
  setTimeout(()=>{
    document.querySelectorAll('.obj-bar').forEach(bar=>{
      bar.style.width=bar.dataset.w+'%';
    });
  },250);
}

function countUp(id,target,sfx){
  const el=document.getElementById(id);
  if(!el||target===0){if(el)el.textContent=target+sfx;return;}
  let n=0;const step=Math.max(1,Math.floor(target/28));
  const iv=setInterval(()=>{n=Math.min(n+step,target);el.textContent=n+sfx;if(n>=target)clearInterval(iv);},30);
}

// ════════════════════════════
// PDF DOWNLOAD — A4, auto-open+print
// ════════════════════════════
function downloadPDF(){
  if(!result||!result.imageData){alert('No result to download.');return;}
  const preds  =result.predictions||[];
  const total  =preds.length;
  const unique =[...new Set(preds.map(p=>p.class))].length;
  const topCls =total>0?preds[0].class:'—';
  const avgConf=total>0?Math.round(preds.reduce((s,p)=>s+(p.score!=null?p.score:(p.confidence||0)/100),0)/total*100):0;
  const ts     =result.timestamp?new Date(result.timestamp).toLocaleString():new Date().toLocaleString();
  const imgSrc =result.annotatedImage||result.imageData;

  const rows=preds.map((p,i)=>{
    const conf=p.score!=null?Math.round(p.score*100):(p.confidence||0);
    const bbox=Array.isArray(p.bbox)?p.bbox.map(v=>Math.round(v)):[];
    const c=BOX_COLORS[i%BOX_COLORS.length];
    return `<tr>
      <td style="padding:8px 10px"><span style="display:inline-block;padding:3px 12px;border-radius:20px;background:${c};color:#fff;font-size:11px;font-weight:700;text-transform:capitalize">${p.class}</span></td>
      <td style="padding:8px 10px;text-align:center;font-weight:800;color:${c};font-size:13px">${conf}%</td>
      <td style="padding:8px 10px">
        <div style="background:#e2e8f0;border-radius:3px;height:8px;width:240px;overflow:hidden">
          <div style="background:${c};height:100%;width:${Math.round(conf*2.4)}px;border-radius:3px"></div>
        </div>
      </td>
      <td style="padding:8px 10px;font-size:10px;color:#64748b">[${bbox.join(', ')}]</td>
    </tr>`;
  }).join('');

  const html=`<!DOCTYPE html>
<html><head>
<meta charset="UTF-8"/>
<title>DeepSight AI — Detection Report</title>
<style>
@page{size:A4;margin:14mm 12mm;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:#fff;color:#111;font-size:13px;line-height:1.5;}
.hdr{display:flex;align-items:flex-start;justify-content:space-between;padding-bottom:12px;border-bottom:2.5px solid #0ea5e9;margin-bottom:18px;}
.brand-name{font-size:22px;font-weight:900;letter-spacing:-0.5px;}
.brand-name .s{color:#0ea5e9;}.brand-name .a{color:#8b5cf6;}
.tagline{font-size:9px;color:#6b7280;margin-top:3px;}
.meta{text-align:right;font-size:10px;color:#6b7280;line-height:1.7;}
.sec{font-size:14px;font-weight:800;margin:16px 0 10px;color:#0f172a;padding-left:6px;border-left:3px solid #0ea5e9;}
.img-box{width:100%;border-radius:8px;overflow:hidden;border:1px solid #e2e8f0;margin-bottom:4px;text-align:center;background:#f8fafc;}
.img-box img{max-width:100%;max-height:260px;object-fit:contain;display:block;margin:0 auto;}
.stats{display:flex;gap:8px;margin-bottom:4px;}
.st{flex:1;background:#f1f9ff;border:1px solid #bae6fd;border-radius:10px;padding:10px 6px;text-align:center;}
.st-n{font-size:20px;font-weight:900;color:#0ea5e9;line-height:1;}
.st-n.pu{color:#8b5cf6;}
.st-l{font-size:9px;color:#6b7280;margin-top:3px;}
table{width:100%;border-collapse:collapse;}
thead tr{background:#f0f9ff;}
th{padding:7px 10px;text-align:left;font-weight:700;color:#334155;font-size:10px;border-bottom:1px solid #e2e8f0;text-transform:uppercase;letter-spacing:0.5px;}
tbody tr{border-bottom:1px solid #f1f5f9;}
.foot{margin-top:18px;padding-top:8px;border-top:1px solid #e2e8f0;display:flex;justify-content:space-between;font-size:9px;color:#94a3b8;}
</style>
</head><body>
<div class="hdr">
  <div>
    <div class="brand-name">Deep<span class="s">Sight</span> <span class="a">AI</span></div>
    <div class="tagline">Real-time object detection powered by AI &nbsp;·&nbsp; Detect. Identify. Analyze.</div>
  </div>
  <div class="meta">
    <div><b>Detection Report</b></div>
    <div>${ts}</div>
    <div>User: <b>${user||'—'}</b></div>
    <div>Source: <b>${result.source||'upload'}</b></div>
  </div>
</div>

<div class="sec">Annotated Image</div>
<div class="img-box"><img src="${imgSrc}" alt="Detected"/></div>

<div class="sec">Detection Summary</div>
<div class="stats">
  <div class="st"><div class="st-n">${total}</div><div class="st-l">Objects Found</div></div>
  <div class="st"><div class="st-n">${unique}</div><div class="st-l">Unique Classes</div></div>
  <div class="st"><div class="st-n pu" style="font-size:${topCls.length>8?'13px':'20px'}">${topCls}</div><div class="st-l">Top Detection</div></div>
  <div class="st"><div class="st-n">${avgConf}%</div><div class="st-l">Avg Confidence</div></div>
</div>

<div class="sec">Detected Objects</div>
${preds.length===0
  ? '<p style="color:#94a3b8;font-size:12px;padding:8px">No objects detected.</p>'
  : `<table><thead><tr><th>Object</th><th>Confidence</th><th>Bar</th><th>Bounding Box</th></tr></thead><tbody>${rows}</tbody></table>`
}

<div class="foot">
  <span>Generated by DeepSight AI</span>
  <span>© ${new Date().getFullYear()} DeepSight AI · Syed Numan Pasha</span>
</div>
</body></html>`;
